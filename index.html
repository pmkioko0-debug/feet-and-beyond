<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feet & Beyond | Every Step, Every Style</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <h1>👟 Feet & Beyond</h1>
        <p>Every Step, Every Style</p>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="#">Accessories</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Walk With Confidence</h2>
    <p>Quality shoes, fashion and accessories delivered across Kenya.</p>
    <button>Shop Now</button>
</section>

<section class="categories">
    <h2>Shop by Category</h2>

    <div class="category-grid">

        <div class="card">
            <h3>👟 Sneakers</h3>
        </div>

        <div class="card">
            <h3>👢 Boots</h3>
        </div>

        <div class="card">
            <h3>👠 Heels</h3>
        </div>

        <div class="card">
            <h3>👞 Loafers</h3>
        </div>

        <div class="card">
            <h3>👕 Clothing</h3>
        </div>

        <div class="card">
            <h3>🎒 Accessories</h3>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Feet & Beyond. All Rights Reserved.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
